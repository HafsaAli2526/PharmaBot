version: "3.9"

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_DB: pharmaai
  POSTGRES_USER: pharmaai
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  REDIS_HOST: redis
  RABBITMQ_HOST: rabbitmq

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pharmaai
      POSTGRES_USER: pharmaai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmaai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672" # management UI
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn pharmaai.api.app:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Rasa server ────────────────────────────────────────────────────────────
  rasa:
    image: rasa/rasa:3.6.0-full
    command: run --enable-api --cors "*" --port 5005
    ports:
      - "5005:5005"
    volumes:
      - ./rasa_bot:/app
    depends_on:
      - rasa-actions
    restart: unless-stopped

  # ── Rasa action server ─────────────────────────────────────────────────────
  rasa-actions:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m rasa_sdk --actions rasa_bot.actions --port 5055
    ports:
      - "5055:5055"
    environment:
      <<: *common-env
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./configs:/app/configs:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── Ingestion worker ───────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/run_ingestion.py
    environment:
      <<: *common-env
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  rabbit_data:
  prometheus_data:
  grafana_data:
